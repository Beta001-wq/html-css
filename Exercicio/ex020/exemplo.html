<head>

    <title>Exemplo de esconde esconde</title>
    <style>
body{
    font-family: Arial, Helvetica, sans-serif;
}

div> p{
    display: none;
}
div:active > p
{
    display: block;
    background-color: brown;
    color: white;
    width: 300px;
}
div:hover{
    background-color: rgba(55, 140, 219, 0.596);
       width: 300px;
}


    </style>
</head>
<body>

<div>
    Passe o Mouse Aqui
    <p>Nelson Calueto</p>
</div>
